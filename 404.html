<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var base = "/litter-box";
        var path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem("gh-pages-spa-redirect", path);
        window.location.replace(base + "/");
      })();
    </script>
  </head>
  <body></body>
</html>
