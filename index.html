<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Litter Box | Premium Smart Litter Solutions</title>
    <meta
      name="description"
      content="Minimal European-style litter box storefront built with Vue for direct seller contact and product browsing."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var redirect = sessionStorage.getItem("gh-pages-spa-redirect");
        if (!redirect) return;
        sessionStorage.removeItem("gh-pages-spa-redirect");
        var path = redirect;
        if (path.charAt(0) !== "/") path = "/" + path;
        window.history.replaceState(null, "", path);
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
